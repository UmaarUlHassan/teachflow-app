<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachFlow - Professional Teaching Studio</title>
    <style>
        body { font-family: sans-serif; background-color: #0B0D13; color: white; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 100px auto; padding: 20px; }
        img.logo { width: 120px; margin-bottom: 20px; }
        h1 { font-size: 3rem; background: linear-gradient(110deg, #94a3b8, #ffffff, #94a3b8); -webkit-background-clip: text; color: transparent; }
        p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6; }
        .video-container { margin-top: 40px; border: 1px solid #334155; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        .badge { background: #6366f1; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/logo.png" alt="TeachFlow Logo" class="logo">
        <div class="badge">COMING SOON</div>
        <h1>TeachFlow</h1>
        <p>A high-performance interactive desktop teaching studio built for modern educators and physics lecturers.</p>
        
        <div class="video-container">
            <video controls autoplay muted loop>
                <source src="assets/demo.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>

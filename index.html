<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachFlow - Professional Teaching Studio</title>
    <style>
        body { font-family: sans-serif; background-color: #0B0D13; color: white; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 80px auto; padding: 20px; }
        img.logo { width: 120px; margin-bottom: 20px; border-radius: 20px; }
        h1 { font-size: 3rem; background: linear-gradient(110deg, #94a3b8, #ffffff, #94a3b8); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; }
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0; 
            overflow: hidden; 
            border: 2px solid #334155; 
            border-radius: 15px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        .badge { background: #6366f1; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/logo.png" alt="TeachFlow Logo" class="logo">
        <br>
        <div class="badge">PRO EDITION</div>
        <h1>TeachFlow</h1>
        <p>The ultimate high-performance interactive desktop studio designed for modern physics lecturers and digital educators.</p>
        
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/GsemBI5rTes?autoplay=1&mute=1" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
